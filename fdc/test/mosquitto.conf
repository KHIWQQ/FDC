# ============================================================
#  Mosquitto broker — โหมดทดสอบ mTLS (ใช้ในแล็บ)
# ------------------------------------------------------------
#  รัน:  mosquitto -c fdc/test/mosquitto.conf -v
#  ติดตั้ง: sudo apt install mosquitto mosquitto-clients
#
#  หมายเหตุ path ใบรับรองเป็นแบบ relative กับที่รัน mosquitto
#  ให้รันจากโฟลเดอร์ fdc/ หรือแก้ path ให้เป็น absolute
# ============================================================

# ไม่มี listener แบบ plaintext — TLS เท่านั้น (เหมือนงานจริง)
listener 8883

# --- mutual TLS ---
cafile   certs/ca.crt          # ใช้ตรวจใบรับรองของ client (ศอย.)
certfile certs/broker.crt      # ใบรับรองของ broker เอง
keyfile  certs/broker.key      # กุญแจลับ broker

# require_certificate true = client ต้องยื่นใบรับรองที่ CA เราออกเท่านั้น
# นี่คือหัวใจของ "mutual" — ไม่มีใบรับรองที่ถูกต้อง ต่อไม่ได้เลย
require_certificate true
use_identity_as_username true   # ใช้ CN ของใบรับรองเป็น username (ทำ ACL ต่อได้)

tls_version tlsv1.2

# เพิกถอน: ชี้ไป CRL เพื่อกันเครื่องที่ถูก revoke (อัปเดตไฟล์เมื่อ revoke)
crlfile certs/crl.pem

# โหมดทดสอบ: ยอมให้ผ่านแม้ไม่มี user/pass (เพราะ auth ด้วย cert แล้ว)
allow_anonymous true

# log ละเอียดตอนทดสอบ
log_type all
log_timestamp true
