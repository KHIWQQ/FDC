# ============================================================
#  Mosquitto — broker ศูนย์บัญชาการ (STEP D1)
#  รับ telemetry จากทุก ศอย. ผ่าน mutual TLS เท่านั้น
# ============================================================

persistence true
persistence_location /mosquitto/data/
log_dest stdout
log_type warning
log_type notice

# ---- ห้าม anonymous / plaintext ----
# ไม่เปิด listener 1883 (plaintext) เลย — งานทหารต้อง TLS ล้วน
listener 8883
protocol mqtt

# ---- mutual TLS ----
cafile   /mosquitto/certs/ca.crt
certfile /mosquitto/certs/broker.crt
keyfile  /mosquitto/certs/broker.key
require_certificate true          # node ต้องมีใบรับรอง = ยืนยันตัวตน
tls_version tlsv1.2
# ใช้ CN ของ client cert เป็น username → ผูกกับ ACL
use_identity_as_username true

allow_anonymous false

# ---- ACL: จำกัดว่าใครเขียน/อ่าน topic ไหนได้ ----
acl_file /mosquitto/config/aclfile
