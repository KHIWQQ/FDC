# ============================================================
#  STEP D1 — Stack ศูนย์บัญชาการระดับประเทศ (cloud-ready)
#    db        : PostgreSQL + PostGIS + TimescaleDB
#    mosquitto : MQTT broker (mutual TLS) รับ telemetry ทุก ศอย.
#    ingest    : FastAPI — subscribe MQTT → เขียน DB → push realtime + REST + คำสั่ง
#
#  เริ่มใช้:  cp .env.example .env  &&  แก้ค่า  &&  ./make-certs.sh  &&  docker compose up -d
# ============================================================

services:
  db:
    image: timescale/timescaledb-ha:pg16     # มี TimescaleDB + PostGIS ในตัว
    environment:
      POSTGRES_USER:     ${DB_USER:-fdc}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-fdc}
      POSTGRES_DB:       ${DB_NAME:-fdc}
    volumes:
      - db_data:/home/postgres/pgdata/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/10-schema.sql:ro
      - ./db/20-aggregates.sql:/docker-entrypoint-initdb.d/20-aggregates.sql:ro
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-fdc} -d ${DB_NAME:-fdc}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  mosquitto:
    image: eclipse-mosquitto:2
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./mosquitto/aclfile:/mosquitto/config/aclfile:ro
      - ./certs:/mosquitto/certs:ro
      - mosq_data:/mosquitto/data
    ports:
      - "${MQTT_PORT:-8883}:8883"
    restart: unless-stopped

  ingest:
    build: ./ingest
    depends_on:
      db:
        condition: service_healthy
      mosquitto:
        condition: service_started
    environment:
      DB_DSN:            postgresql://${DB_USER:-fdc}:${DB_PASSWORD:-fdc}@db:5432/${DB_NAME:-fdc}
      MQTT_HOST:         mosquitto
      MQTT_PORT:         "8883"
      MQTT_TLS:          "true"
      MQTT_CA_CERT:      /certs/ca.crt
      MQTT_CLIENT_CERT:  /certs/ingest.crt
      MQTT_CLIENT_KEY:   /certs/ingest.key
      # คีย์เซ็นคำสั่ง downlink (HMAC) — ใส่ใน .env อย่า commit
      FDC_CMD_HMAC_KEYS: ${FDC_CMD_HMAC_KEYS:-}
      FDC_CMD_HMAC_KEY:  ${FDC_CMD_HMAC_KEY:-}
      WEB_DIR:           /app/web
      # auth / RBAC (STEP D3)
      AUTH_ENABLED:      ${AUTH_ENABLED:-true}
      JWT_SECRET:        ${JWT_SECRET:-}
      JWT_TTL_MIN:       ${JWT_TTL_MIN:-720}
      ADMIN_USER:        ${ADMIN_USER:-admin}
      ADMIN_PASSWORD:    ${ADMIN_PASSWORD:-}
    volumes:
      - ./certs:/certs:ro
      - ./web:/app/web:ro       # dashboard (D2) — เปลี่ยนหน้าเว็บได้โดยไม่ rebuild
    ports:
      - "${API_PORT:-8000}:8000"
    restart: unless-stopped

volumes:
  db_data:
  mosq_data:
