# ============================================================
#  FDC node configuration (STEP C2)
# ============================================================
#  ไฟล์นี้กำหนด "ตัวตน" ของ ศอย. เครื่องนี้ และวิธีเชื่อมขึ้นศูนย์บัญชาการ
#  - แก้ค่าให้ตรงหน่วยจริงก่อนนำไปใช้
#  - ถ้า uplink.enabled = false หรือไม่มีไฟล์นี้เลย → ศอย. ทำงานออฟไลน์ได้ครบ
#    (Edge autonomy: รับพิกัดหมู่ปืน, คำนวณ, สั่งยิง โดยไม่พึ่งเน็ต)
# ============================================================

identity:
  unit:    "BN1-A"        # หน่วย (กองพัน-กองร้อย) — ใช้เป็น addressing ลำดับชั้น
  node:    "FDC01"        # หมายเลข ศอย. ในหน่วย (ไม่ซ้ำกันในหน่วยเดียวกัน)
  name:    "ศอย. ร้อย.1"   # ชื่อแสดงผล
  base_lat: 0.0           # พิกัดฐานที่ตั้ง (อ้างอิง/แสดงบนแผนที่ศูนย์)
  base_lon: 0.0

# ------------------------------------------------------------
#  วิทยุ LoRa (FDC dongle) — STEP B2
# ------------------------------------------------------------
radio:
  # PSK ยืนยันตัวตน dongle: hex 32 ตัว (16 ไบต์) — ค่าเดียวกับ loraKey ในเฟิร์มแวร์
  # ตั้ง key ลงอุปกรณ์ (dongle และ gun unit ทุกตัวในกองร้อย) ผ่าน USB serial:
  #   {"type":"SET_KEY","key":"<hex32>"}
  # เว้นว่าง = ข้ามการตรวจ HMAC (โหมดทดสอบเท่านั้น — อย่าใช้งานจริง)
  # ค่า default key ของเฟิร์มแวร์ ("FDC-DEFAULT-KEY!") = 4644432d44454641554c542d4b455921
  psk: ""

# ------------------------------------------------------------
#  Uplink ขึ้นศูนย์บัญชาการ — MQTT over mutual TLS
# ------------------------------------------------------------
uplink:
  enabled: false          # เปิดเมื่อพร้อมต่อศูนย์จริง (ค่าเริ่มต้น = ปิด เพื่อให้รันเดี่ยวได้)

  broker:
    host: "central.example.mil"
    port: 8883            # TLS เท่านั้น — ห้ามใช้ 1883 (plaintext) ในงานจริง
    keepalive: 30         # วินาที — สั้นเพื่อตรวจ node ตายเร็ว (คู่กับ LWT)

  # mutual TLS (mTLS) — ยืนยันตัวตนสองทาง ทั้ง broker และ node
  tls:
    ca_cert:     "certs/ca.crt"        # ใบรับรองของ CA ทหาร (ใช้ตรวจ broker)
    client_cert: "certs/fdc01.crt"     # ใบรับรองของ node นี้
    client_key:  "certs/fdc01.key"     # private key ของ node นี้ (เก็บให้ดี chmod 600)
    min_version: "TLSv1.2"             # ขั้นต่ำ — กันโจมตี downgrade

  # ความปลอดภัยชั้นแอปบน "คำสั่งยิงที่สั่งลงมาจากศูนย์" (downlink)
  # ป้องกัน replay/ปลอมคำสั่ง แม้ broker ถูกเจาะ (defense in depth)
  command_auth:
    # คีย์ลับร่วม (HMAC-SHA256) ต่อหน่วย — ในงานจริงโหลดจาก env/HSM ไม่ commit ลง repo
    hmac_key_env: "FDC_CMD_HMAC_KEY"   # ชื่อ env var ที่เก็บคีย์ (hex)
    max_skew_sec: 30                   # คำสั่งที่ timestamp เก่ากว่านี้ = ปฏิเสธ

  # store-and-forward — เน็ตหลุดไม่ทำข้อมูลหาย
  queue:
    db_path: "uplink_queue.db"         # SQLite เก็บข้อความค้างส่ง
    max_rows: 50000                    # เพดานกันดิสก์เต็ม (ทิ้งของเก่าสุดเมื่อเกิน)

  publish_qos: 1          # at-least-once — telemetry สำคัญต้องถึง
